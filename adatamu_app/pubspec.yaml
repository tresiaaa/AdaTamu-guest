name: adatamu_app
description: "Aplikasi Buku Tamu Digital AdaTamu"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Font "Poppins" diambil lewat package ini (tidak perlu bundling file
  # font manual). Lihat lib/theme/app_theme.dart.
  google_fonts: ^6.2.1

  # Dipakai untuk mengakses Cloud Firestore lewat REST API di SEMUA
  # platform (Android & Windows). Lihat lib/services/guest_service.dart
  # untuk alasan kenapa REST API dipilih dibanding plugin cloud_firestore.
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
